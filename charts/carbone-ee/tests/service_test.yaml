suite: Services
templates:
  - templates/service.yaml
tests:
  - it: should render exactly two services
    asserts:
      - hasDocuments:
          count: 2

  - it: headless service should have clusterIP None and -service suffix
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: carbone-ee-production-service
      - equal:
          path: spec.clusterIP
          value: None

  - it: ClusterIP service should have no clusterIP override and no -service suffix
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: carbone-ee-production
      - equal:
          path: spec.type
          value: ClusterIP

  - it: both services should expose the configured port
    set:
      applicationConfiguration.port: 4000
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 4000
          documentIndex: 0
      - equal:
          path: spec.ports[0].port
          value: 4000
          documentIndex: 1
