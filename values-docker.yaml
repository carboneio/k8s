ingress:
  className: nginx
  annotations: 
    ## max body size should be more than max template size and max json size
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    ## Timeout configuration
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: carbone.local
      paths:
        - path: /
          pathType: Prefix

replicaCount: 2

applicationConfiguration:
  authentication: false
  authenticationPublicKey:
  license: <Your Licence>

persistentStorage:
  s3:
    enabled: true
    templatesBucket: <Bucket name to store templates>
    rendersBucket: <Bucket name to store renders>
    endpoint: s3.eu-west-1.amazonaws.com
    region: eu-west-1
    accessKeyId: <S3 Access Key ID>
    accessKeySecret: <S3 Access Key Secret>
